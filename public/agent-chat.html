<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkerX AI Command Console & Chatroom</title>
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts Outfit & Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', 'Outfit', sans-serif;
      background-color: #0b0f19;
    }
  </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col justify-between">

  <!-- Header -->
  <header class="sticky top-0 z-40 bg-[#0b0f19]/80 backdrop-blur-md border-b border-slate-800/80 px-6 py-4 flex justify-between items-center shadow-lg">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-extrabold text-lg shadow-md shadow-blue-500/25">X</div>
      <div>
        <h1 class="text-base font-black tracking-tight text-white leading-none">LinkerX AI 명령창</h1>
        <span class="text-[10px] text-slate-400 font-bold">동명식품 실시간 통합 에이전트 채널</span>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></span>
      <span class="text-xs text-slate-350 font-bold bg-slate-900 border border-slate-800 px-3 py-1 rounded-full shadow-sm">에이전트 온라인</span>
    </div>
  </header>

  <!-- Messages Area -->
  <main id="chat-box" class="flex-1 overflow-y-auto px-6 py-5 space-y-4 scroll-smooth">
    <!-- Notice Card -->
    <div class="bg-blue-500/10 border border-blue-500/20 rounded-2xl p-5 max-w-2xl mx-auto space-y-3 shadow-md shadow-blue-500/5">
      <h3 class="text-white text-sm font-black flex items-center gap-2">
        📢 AI 에이전트 채널 이용 안내
      </h3>
      <p class="text-xs text-slate-450 leading-relaxed">
        이곳은 데스크톱 ERP 및 모바일 연동 앱과 실시간으로 연동되는 **글로벌 에이전트 명령창**입니다. 
        어디서나 간편하게 명령어를 입력하여 핵심 물류/재고/매출 데이터를 즉각 확인해 보실 수 있습니다.
      </p>
      <div class="grid grid-cols-3 gap-2 pt-1 text-[11px] font-bold">
        <div class="bg-slate-900/60 p-2.5 rounded-lg border border-slate-800/50 text-center">
          <span class="block text-blue-400 mb-0.5">!매출</span>
          <span class="text-slate-400 text-[9px] font-medium">오늘 매출 집계</span>
        </div>
        <div class="bg-slate-900/60 p-2.5 rounded-lg border border-slate-800/50 text-center">
          <span class="block text-blue-400 mb-0.5">!재고</span>
          <span class="text-slate-400 text-[9px] font-medium">재고부족 분석</span>
        </div>
        <div class="bg-slate-900/60 p-2.5 rounded-lg border border-slate-800/50 text-center">
          <span class="block text-blue-400 mb-0.5">!미수금</span>
          <span class="text-slate-400 text-[9px] font-medium">외상잔액 TOP5</span>
        </div>
      </div>
    </div>

    <!-- Messages Container -->
    <div id="messages-container" class="max-w-2xl mx-auto space-y-3.5">
      <!-- Loading indicator -->
      <div id="loading" class="text-center text-slate-500 text-xs py-10">
        데이터베이스 메시지 로딩 중...
      </div>
    </div>
  </main>

  <!-- Input Bar -->
  <footer class="sticky bottom-0 bg-[#0b0f19]/90 backdrop-blur-md border-t border-slate-900 p-4">
    <div class="max-w-2xl mx-auto">
      <form id="chat-form" class="flex gap-2.5">
        <input 
          id="message-input"
          type="text" 
          placeholder="에이전트에게 내릴 명령이나 질문을 입력하세요..." 
          autocomplete="off"
          class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 transition-all shadow-inner"
        />
        <button 
          type="submit"
          class="bg-blue-600 hover:bg-blue-700 text-white font-black px-6 py-3 rounded-xl text-sm transition-all shadow-lg shadow-blue-500/25 flex items-center justify-center gap-1.5"
        >
          <span>전송</span>
        </button>
      </form>
    </div>
  </footer>

  <!-- Firebase Scripts (compat version for easy browser-direct usage) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyAqx7nPiQ0mJGqnAGv28dO5C3-GQuqkpk",
      authDomain: "link-x-6606e.firebaseapp.com",
      projectId: "link-x-6606e",
      storageBucket: "link-x-6606e.firebasestorage.app",
      messagingSenderId: "236294239528",
      appId: "1:236294239528:web:8f735c42d36d6d1c434c1d",
      measurementId: "G-G8626RZH6X"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const messagesContainer = document.getElementById("messages-container");
    const chatForm = document.getElementById("chat-form");
    const messageInput = document.getElementById("message-input");
    const chatBox = document.getElementById("chat-box");
    const loadingEl = document.getElementById("loading");

    // Real-time Chat Listener
    db.collection("companies").doc("DMK").collection("agentChats")
      .orderBy("timestamp", "asc")
      .onSnapshot((snapshot) => {
        loadingEl.style.display = "none";
        
        // Accumulate HTML
        let htmlContent = "";
        
        snapshot.forEach((doc) => {
          const msg = doc.data();
          const isMe = msg.sender === "User";
          const timestamp = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) : '';
          
          if (isMe) {
            // User Chat Bubble
            htmlContent += `
              <div class="flex justify-end items-start gap-2.5 animate-fadeIn">
                <div class="flex flex-col items-end">
                  <span class="text-[10px] text-slate-500 font-bold mb-1">사용자</span>
                  <div class="bg-blue-600 text-white rounded-2xl rounded-tr-none px-4 py-2.5 text-xs max-w-md shadow-md">
                    ${msg.text.replace(/\n/g, '<br/>')}
                  </div>
                  <span class="text-[8px] text-slate-650 mt-1 font-bold">${timestamp}</span>
                </div>
              </div>
            `;
          } else {
            // Agent Chat Bubble
            htmlContent += `
              <div class="flex justify-start items-start gap-2.5 animate-fadeIn">
                <div class="w-8 h-8 rounded-lg bg-slate-900 border border-slate-800 flex items-center justify-center font-extrabold text-blue-400 text-xs shadow-sm">AI</div>
                <div class="flex flex-col items-start">
                  <span class="text-[10px] text-slate-500 font-bold mb-1">${msg.senderName || 'AI 에이전트'}</span>
                  <div class="bg-slate-900 border border-slate-850/80 text-slate-200 rounded-2xl rounded-tl-none px-4 py-2.5 text-xs max-w-md leading-relaxed shadow-sm">
                    ${msg.text.replace(/\n/g, '<br/>')}
                  </div>
                  <span class="text-[8px] text-slate-650 mt-1 font-bold">${timestamp}</span>
                </div>
              </div>
            `;
          }
        });
        
        messagesContainer.innerHTML = htmlContent;
        
        // Auto Scroll to bottom
        chatBox.scrollTop = chatBox.scrollHeight;
      }, (err) => {
        console.error("Firestore listener error:", err);
      });

    // Send Message
    chatForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = messageInput.value.trim();
      if (!text) return;

      const messageId = `msg_u_${Date.now()}`;
      
      try {
        messageInput.value = "";
        await db.collection("companies").doc("DMK").collection("agentChats").doc(messageId).set({
          id: messageId,
          timestamp: new Date().toISOString(),
          sender: "User",
          senderName: "사용자",
          text: text,
          status: "pending"
        });
      } catch (err) {
        console.error("Error sending message:", err);
        alert("메시지 전송 중 오류가 발생했습니다.");
      }
    });

  </script>
</body>
</html>

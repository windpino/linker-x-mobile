<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Link X - 물류관리 시스템 (Mobile)</title>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PWA Web Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Mobile App Customizations -->
    <meta name="theme-color" content="#1d4ed8" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- iOS Specific Standalone Settings (Hides Safari navigation bar) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Link X" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          if (window.location.hostname === 'localhost') {
            navigator.serviceWorker.getRegistrations().then(registrations => {
              for (let registration of registrations) {
                registration.unregister().then(success => {
                  if (success) {
                    console.log('Development Service worker unregistered.');
                    window.location.reload();
                  }
                });
              }
            });
          } else {
            navigator.serviceWorker.register('/sw.js')
              .then(reg => console.log('Service worker registered successfully:', reg.scope))
              .catch(err => console.error('Service worker registration failed:', err));
          }
        });
      }
    </script>
  </body>
</html>
